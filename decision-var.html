<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Decisión del VAR</title>

<link rel="stylesheet" href="css/style.css">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2c3e50">

</head>

<body>

<h1>⚽ Decisión del VAR</h1>

<p>
Deberás decidir si la afirmación es verdadera o falsa.
</p>

<p>
✔ Respuesta correcta → +1 punto<br>
✍️ Justificación parcial → +2 puntos<br>
🏆 Justificación completa → +3 puntos
</p>

<h2 id="pregunta">
Cargando pregunta...
</h2>

<div class="botones-var">

<button id="verdadero">
Verdadero ✅
</button>

<button id="falso">
Falso ❌
</button>

</div>

<br>

<input
type="text"
id="justificacion"
placeholder="Escribe tu justificación...">

<br><br>

<button id="siguiente">
Siguiente pregunta ➡️
</button>

<h3 id="puntaje">
Puntaje: 0
</h3>

<p id="resultado"></p>

<a href="index.html" class="volver">
⬅ Volver al menú
</a>

<script src="js/decision-var.js"></script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>

</html>
