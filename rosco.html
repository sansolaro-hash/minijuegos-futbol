<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Rosco Pasapalabra Futbolero</title>
  
  <link rel="stylesheet" href="css/style.css">

  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2c3e50">

</head>

<body>
  <h1>Pasapalabra Futbolero ⚽🔵</h1>

  <div id="configuracion">

<label>Dificultad:</label>

<select id="dificultad">
  <option value="facil">Fácil (250s)</option>
  <option value="medio">Medio (200s)</option>
  <option value="dificil">Difícil (150s)</option>
  <option value="extremo">Extremo (100s)</option>
</select>

<p id="tiempo">Tiempo: 0</p>
<p id="record">🏆 Récord: 0</p>
<div id="estadisticas">

<p id="partidas">🎮 Partidas: 0</p>

<p id="aciertosTotales">✅ Aciertos totales: 0</p>

<p id="erroresTotales">❌ Errores totales: 0</p>

<p id="promedio">📈 Promedio aciertos: 0</p>

</div>

<p id="medalla"></p>

</div>
 
  <div id="rosco"></div>

  <div id="pregunta">Haz clic en una letra para comenzar</div>
  <input type="text" id="respuesta" placeholder="Tu respuesta...">
  <button id="comprobar">Comprobar</button>
  <button id="pasapalabra">Pasapalabra ⏭️</button>
  <button onclick="window.location.href='index.html'">
  Volver al inicio 🏠
  </button>
  <button id="reiniciar">🔄 Jugar otra vez</button>

  <script src="js/rosco.js"></script>

  <script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
